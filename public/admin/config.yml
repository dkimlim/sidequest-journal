# Decap CMS config for Sidequest Journal.
#
# This site is on GitHub Pages, which is static-only, so the GitHub OAuth
# handshake is proxied through Netlify Functions in netlify/functions/
# (auth.js + callback.js), deployed via the sidequest-journal Netlify site.
#
# One-time setup on Netlify's side:
#   1. Create a GitHub OAuth App with callback URL
#      https://sidequest-journal.netlify.app/callback
#   2. Set OAUTH_CLIENT_ID / OAUTH_CLIENT_SECRET env vars on the Netlify site
#      to that OAuth App's credentials.

backend:
  name: github
  repo: dkimlim/sidequest-journal # owner/repo — update if this changes
  branch: main
  base_url: https://sidequest-journal.netlify.app
  auth_endpoint: api/auth

# For local editing without GitHub auth: run `npx decap-server` in another
# terminal, then uncomment the line below.
# local_backend: true

publish_mode: editorial_workflow

# Astro's content-collection `image()` schema helper needs a Vite-resolvable
# relative import path in frontmatter (e.g. ../../assets/uploads/foo.jpg),
# not a public URL. A relative public_folder makes Decap write paths in
# exactly that form.
media_folder: src/assets/uploads
public_folder: ../../assets/uploads

collections:
  - name: blog
    label: Journal Posts
    folder: src/content/blog
    create: true
    extension: md
    format: frontmatter
    identifier_field: description
    slug: '{{slug}}'
    summary: '{{postType}} — {{title}}'
    fields:
      - label: Title
        name: title
        widget: string
        required: false
        hint: "Leave blank for photo or thought posts that don't need a headline."
      - label: Description
        name: description
        widget: text
        hint: 'Short summary — used for SEO, RSS, and as the archive-list title when there is no Title.'
      - label: Publish Date
        name: pubDate
        widget: datetime
        format: 'YYYY-MM-DD'
      - label: Updated Date
        name: updatedDate
        widget: datetime
        format: 'YYYY-MM-DD'
        required: false
      - label: Type
        name: postType
        widget: select
        options: ['essay', 'photo', 'thought', 'reading', 'note']
        default: 'note'
      - label: Hero Image
        name: heroImage
        widget: image
        required: false
      - label: Image Caption
        name: caption
        widget: string
        required: false
      - label: Tags
        name: tags
        widget: list
        required: false
        default: []
      - label: Body
        name: body
        widget: markdown

  # Decap collections support one `extension` per collection, but this repo's
  # content.config.ts loader matches both .md and .mdx in src/content/blog.
  # This second collection covers the .mdx posts the one above can't see —
  # same folder, same fields, filtered to the other extension.
  - name: blog_mdx
    label: Journal Posts (MDX)
    folder: src/content/blog
    create: true
    extension: mdx
    format: frontmatter
    identifier_field: description
    slug: '{{slug}}'
    summary: '{{postType}} — {{title}}'
    fields:
      - label: Title
        name: title
        widget: string
        required: false
        hint: "Leave blank for photo or thought posts that don't need a headline."
      - label: Description
        name: description
        widget: text
        hint: 'Short summary — used for SEO, RSS, and as the archive-list title when there is no Title.'
      - label: Publish Date
        name: pubDate
        widget: datetime
        format: 'YYYY-MM-DD'
      - label: Updated Date
        name: updatedDate
        widget: datetime
        format: 'YYYY-MM-DD'
        required: false
      - label: Type
        name: postType
        widget: select
        options: ['essay', 'photo', 'thought', 'reading', 'note']
        default: 'note'
      - label: Hero Image
        name: heroImage
        widget: image
        required: false
      - label: Image Caption
        name: caption
        widget: string
        required: false
      - label: Tags
        name: tags
        widget: list
        required: false
        default: []
      - label: Body
        name: body
        widget: markdown
